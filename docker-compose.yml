services:
  db:
    image: pgvector/pgvector:pg16
    container_name: knowledgeos-db
    environment:
      POSTGRES_DB: knowledgeos
      POSTGRES_USER: knowledgeos
      POSTGRES_PASSWORD: knowledgeos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledgeos -d knowledgeos"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - knowledgeos-postgres:/var/lib/postgresql/data

volumes:
  knowledgeos-postgres:
